autoInstallPeers: false
dedupePeerDependents: true
engineStrict: true
saveExact: true
strictPeerDependencies: true

packages:
  - packages/*
  - tools/*
  - docs

catalog:
  "@changesets/cli": 2.31.0
  "@commitlint/cli": 21.0.2
  "@commitlint/config-conventional": 21.0.2
  "@types/node": 24.13.2
  "@vitest/coverage-v8": 4.1.8
  knip: 6.16.1
  lefthook: 2.1.9
  oxfmt: 0.54.0
  oxlint: 1.69.0
  ts-pattern: 5.9.0
  tsdown: 0.22.2
  tsx: 4.22.4
  turbo: 2.9.18
  typedoc: 0.28.19
  typedoc-plugin-markdown: 4.12.0
  typescript: 6.0.3
  vitepress: 1.6.4
  vitest: 4.1.8

peerDependencyRules:
  ignoreMissing:
    # Optional analytics peer of VitePress's bundled Algolia DocSearch.
    - search-insights

allowBuilds:
  esbuild: true
  lefthook: true
