autoInstallPeers: false
dedupePeerDependents: true
engineStrict: true
saveExact: true
strictPeerDependencies: true

packages:
  - packages/*
  - tools/*
  - docs

catalog:
  "@changesets/cli": 2.31.0
  "@commitlint/cli": 21.0.2
  "@bloodyowl/boxed": 3.4.0
  "@btravstack/theme": 1.2.1
  "@standard-schema/spec": 1.1.0
  "@commitlint/config-conventional": 21.0.2
  "@oxlint/plugins": 1.69.0
  "@types/node": 24.13.2
  "@vitest/coverage-v8": 4.1.8
  effect: 3.21.4
  knip: 6.16.1
  lefthook: 2.1.9
  neverthrow: 8.2.0
  oxfmt: 0.54.0
  oxlint: 1.69.0
  ts-pattern: 5.9.0
  tsdown: 0.22.2
  tsx: 4.22.4
  turbo: 2.9.18
  typedoc: 0.28.19
  typedoc-plugin-markdown: 4.12.0
  typescript: 6.0.3
  vitepress: 1.6.4
  vitest: 4.1.8

peerDependencyRules:
  ignoreMissing:
    # Optional analytics peer of VitePress's bundled Algolia DocSearch.
    - search-insights

allowBuilds:
  esbuild: true
  lefthook: true

auditConfig:
  ignoreGhsas:
    # vite `server.fs.deny` bypass on Windows alternate paths. Reaches us only
    # through the docs site's dev tooling (docs > vitepress > vite) — a build-time,
    # docs-only transitive dep. It affects the Vite dev server on Windows, which we
    # never run in CI or production (the docs site ships as static HTML), and it is
    # in no published package's runtime dependencies.
    - GHSA-fx2h-pf6j-xcff

minimumReleaseAgeExclude:
  - "@btravstack/theme"
