# Shared hooks come from @btravstack/lefthook (format + lint + commit-msg).
extends:
  - node_modules/@btravstack/lefthook/lefthook.yml

pre-commit:
  commands:
    format:
      exclude:
        - "pnpm-lock.yaml"
        - "docs/api/*"
        - "docs/.vitepress/cache/*"
        - "docs/.vitepress/dist/*"
    lint:
      exclude:
        - "*.test-d.ts"
