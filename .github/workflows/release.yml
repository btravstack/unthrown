name: Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    uses: btravstack/config/.github/workflows/release-reusable.yml@main
    secrets:
      RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
